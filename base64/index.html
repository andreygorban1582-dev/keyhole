<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Base64 — Free Base64 Encoder / Decoder</title>
<meta name="description" content="Free online Base64 encoder and decoder. Encode text to Base64 and decode Base64 back to text instantly. Real-time encoding as you type.">
<style>
:root {
  --bg:#0d1117;
  --surface:#161b22;
  --border:#30363d;
  --text:#e6edf3;
  --dim:#8b949e;
  --accent:#58a6ff;
  --green:#3fb950;
  --orange:#d2991d;
  --red:#f85149;
  --radius:8px;
}
*{margin:0;padding:0;box-sizing:border-box}
body{
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
  background:var(--bg);
  color:var(--text);
  min-height:100vh;
  display:flex;
  flex-direction:column;
}
header{
  background:var(--surface);
  border-bottom:1px solid var(--border);
  padding:14px 20px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  position:sticky;
  top:0;
  z-index:10;
}
header h1{font-size:1.1rem;display:flex;align-items:center;gap:8px}
header nav{display:flex;gap:10px;align-items:center}
header nav a{color:var(--dim);text-decoration:none;font-size:0.8rem}
header nav a:hover{color:var(--text)}
main{
  flex:1;
  max-width:800px;
  width:100%;
  margin:0 auto;
  padding:24px 16px;
}
/* ── Tabs ── */
.tabs{
  display:flex;
  gap:0;
  margin-bottom:16px;
  border-bottom:2px solid var(--border);
}
.tab{
  padding:10px 24px;
  font-size:0.85rem;
  font-weight:600;
  color:var(--dim);
  background:none;
  border:none;
  border-bottom:2px solid transparent;
  margin-bottom:-2px;
  cursor:pointer;
  transition:color 0.15s,border-color 0.15s;
}
.tab:hover{color:var(--text)}
.tab.active{
  color:var(--accent);
  border-bottom-color:var(--accent);
}
/* ── Ad Slot ── */
.ad-slot{
  background:var(--surface);
  border:1px dashed var(--border);
  border-radius:var(--radius);
  padding:12px;
  text-align:center;
  font-size:0.78rem;
  color:var(--dim);
  margin-bottom:16px;
}
.ad-slot a{color:var(--accent)}
/* ── Tool Box ── */
.tool-box{
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:var(--radius);
  padding:20px;
  margin-bottom:16px;
}
textarea{
  width:100%;
  padding:12px;
  background:var(--bg);
  border:1px solid var(--border);
  border-radius:var(--radius);
  color:var(--text);
  font-family:'SF Mono',Consolas,monospace;
  font-size:0.85rem;
  outline:none;
  line-height:1.5;
  transition:border-color 0.15s;
}
textarea:focus{border-color:var(--accent)}
#inputText{min-height:160px;resize:vertical}
#outputText{min-height:160px;max-height:400px;resize:none}
.label-row{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:6px;
}
.label-row span{
  font-size:0.78rem;
  color:var(--dim);
  font-weight:500;
}
/* ── Buttons ── */
.btn{
  display:inline-flex;
  align-items:center;
  gap:6px;
  padding:10px 18px;
  background:var(--accent);
  color:#fff;
  border:none;
  border-radius:var(--radius);
  cursor:pointer;
  font-size:0.85rem;
  font-weight:600;
  transition:opacity 0.15s;
}
.btn:hover{opacity:0.85}
.btn-sm{padding:6px 12px;font-size:0.78rem}
.btn-green{background:var(--green)}
.btn-orange{background:var(--orange)}
.btn-outline{
  background:transparent;
  border:1px solid var(--border);
  color:var(--text);
}
.btn-outline:hover{background:var(--surface)}
.row{
  display:flex;
  gap:10px;
  flex-wrap:wrap;
  align-items:center;
  margin:12px 0;
}
.output-section{margin-top:16px}
/* ── Status ── */
.status{
  font-size:0.78rem;
  color:var(--dim);
  margin-top:6px;
  min-height:1.2em;
}
.status.error{color:var(--red)}
.status.success{color:var(--green)}
/* ── Toast ── */
.toast{
  position:fixed;
  bottom:30px;
  left:50%;
  transform:translateX(-50%);
  background:var(--green);
  color:#fff;
  padding:10px 24px;
  border-radius:var(--radius);
  font-size:0.85rem;
  font-weight:600;
  z-index:100;
  opacity:0;
  pointer-events:none;
  transition:opacity 0.3s;
}
.toast.show{opacity:1}
/* ── BMC ── */
.bmc{
  display:inline-flex;
  align-items:center;
  gap:6px;
  padding:10px 18px;
  background:#ff813f;
  color:#fff;
  text-decoration:none;
  border-radius:var(--radius);
  font-size:0.85rem;
  font-weight:600;
  transition:opacity 0.15s;
}
.bmc:hover{opacity:0.85}
.bmc-section{text-align:center;margin-bottom:16px}
/* ── Footer ── */
.footer-bar{
  text-align:center;
  padding:14px;
  font-size:0.75rem;
  color:var(--dim);
  border-top:1px solid var(--border);
  background:var(--surface);
}
/* ── Responsive ── */
@media(max-width:500px){
  header{flex-wrap:wrap;gap:8px}
  .row{flex-direction:column}
  .tab{padding:10px 16px}
}
</style>
</head>
<body>

<header>
  <h1>🔤 Base64</h1>
  <nav>
    <a href="https://andreygorban1582-dev.github.io/keyhole/">KeyHole</a>
  </nav>
</header>

<main>
  <div class="ad-slot">
    📢 Advertisement — <a href="https://a-ads.com?partner=2305445">Advertise here</a>
  </div>

  <!-- Tabs -->
  <div class="tabs">
    <button class="tab active" id="tabEncode" onclick="switchTab('encode')">🔒 Encode</button>
    <button class="tab" id="tabDecode" onclick="switchTab('decode')">🔓 Decode</button>
  </div>

  <!-- Input -->
  <div class="tool-box">
    <div class="label-row">
      <span id="inputLabel">📝 Text to encode</span>
      <span id="inputStats" style="font-size:0.72rem"></span>
    </div>
    <textarea id="inputText" placeholder="Type or paste text here…" spellcheck="false"></textarea>

    <div class="row">
      <button class="btn" id="actionBtn" onclick="process()">🔒 Encode</button>
      <button class="btn btn-green" onclick="copyOutput()">📋 Copy Output</button>
      <button class="btn btn-sm btn-outline" onclick="clearAll()">🗑 Clear</button>
    </div>

    <!-- Output -->
    <div class="output-section">
      <div class="label-row">
        <span id="outputLabel">📄 Base64 output</span>
      </div>
      <textarea id="outputText" placeholder="Result appears here…" readonly spellcheck="false"></textarea>
      <div class="status" id="statusMsg"></div>
    </div>
  </div>

  <!-- BMC -->
  <div class="bmc-section">
    <a href="https://www.buymeacoffee.com/keyhole" class="bmc" target="_blank">☕ Buy me a coffee</a>
  </div>
</main>

<div class="footer-bar">© 2026 Base64 — Free online Base64 encoder &amp; decoder</div>

<div class="toast" id="toast">✅ Copied!</div>

<script>
var currentTab = 'encode';
var debounceTimer = null;

/* ── Tab switching ── */
function switchTab(tab) {
  currentTab = tab;
  document.getElementById('tabEncode').classList.toggle('active', tab === 'encode');
  document.getElementById('tabDecode').classList.toggle('active', tab === 'decode');

  if (tab === 'encode') {
    document.getElementById('inputLabel').textContent = '📝 Text to encode';
    document.getElementById('outputLabel').textContent = '📄 Base64 output';
    document.getElementById('actionBtn').innerHTML = '🔒 Encode';
    document.getElementById('inputText').placeholder = 'Type or paste text here…';
  } else {
    document.getElementById('inputLabel').textContent = '📝 Base64 to decode';
    document.getElementById('outputLabel').textContent = '📄 Decoded text';
    document.getElementById('actionBtn').innerHTML = '🔓 Decode';
    document.getElementById('inputText').placeholder = 'Paste Base64-encoded text here…';
  }

  // Re-run for real-time
  process();
}

/* ── Process ── */
function process() {
  var input = document.getElementById('inputText').value;
  var output = document.getElementById('outputText');
  var status = document.getElementById('statusMsg');
  var stats = document.getElementById('inputStats');

  // Update stats
  if (input.length === 0) {
    stats.textContent = '';
  } else {
    var bytes = new Blob([input]).size;
    stats.textContent = bytes.toLocaleString() + ' bytes · ' + input.length.toLocaleString() + ' chars';
  }

  if (!input) {
    output.value = '';
    status.textContent = '';
    status.className = 'status';
    return;
  }

  if (currentTab === 'encode') {
    try {
      var encoded = btoa(unescape(encodeURIComponent(input)));
      output.value = encoded;
      status.textContent = '✓ Encoded — ' + encoded.length.toLocaleString() + ' chars';
      status.className = 'status success';
    } catch (e) {
      // Fallback for strings that fail encodeURIComponent
      try {
        var encoded = btoa(input);
        output.value = encoded;
        status.textContent = '✓ Encoded (ASCII only) — ' + encoded.length.toLocaleString() + ' chars';
        status.className = 'status success';
      } catch (e2) {
        output.value = '';
        status.textContent = '✗ Encoding failed: ' + e2.message;
        status.className = 'status error';
      }
    }
  } else {
    try {
      var decoded = decodeURIComponent(escape(atob(input)));
      output.value = decoded;
      status.textContent = '✓ Decoded — ' + decoded.length.toLocaleString() + ' chars';
      status.className = 'status success';
    } catch (e) {
      // Maybe it's ASCII-only base64
      try {
        var decoded = atob(input);
        output.value = decoded;
        status.textContent = '✓ Decoded (ASCII) — ' + decoded.length.toLocaleString() + ' chars';
        status.className = 'status success';
      } catch (e2) {
        output.value = '';
        status.textContent = '✗ Invalid Base64: ' + e2.message;
        status.className = 'status error';
      }
    }
  }
}

/* ── Copy ── */
function copyOutput() {
  var text = document.getElementById('outputText').value;
  if (!text) {
    showToast('⚠ Nothing to copy');
    return;
  }
  navigator.clipboard.writeText(text).then(function() {
    showToast('✅ Copied!');
  }).catch(function() {
    // Fallback
    var ta = document.createElement('textarea');
    ta.value = text;
    ta.style.position = 'fixed';
    ta.style.left = '-9999px';
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
    showToast('✅ Copied!');
  });
}

function showToast(msg) {
  var toast = document.getElementById('toast');
  toast.textContent = msg;
  toast.classList.add('show');
  setTimeout(function() { toast.classList.remove('show'); }, 1800);
}

/* ── Clear ── */
function clearAll() {
  document.getElementById('inputText').value = '';
  document.getElementById('outputText').value = '';
  document.getElementById('statusMsg').textContent = '';
  document.getElementById('statusMsg').className = 'status';
  document.getElementById('inputStats').textContent = '';
}

/* ── Real-time encoding on input ── */
document.getElementById('inputText').addEventListener('input', function() {
  clearTimeout(debounceTimer);
  debounceTimer = setTimeout(process, 150);
});
</script>

</body>
</html>
