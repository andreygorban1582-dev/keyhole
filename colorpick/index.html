<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>ColorPick — Extract Colors from Images</title><meta name="description" content="Free online tool to extract color palettes from any image. Upload or paste an image URL.">
<style>:root{--bg:#0d1117;--surface:#161b22;--border:#30363d;--text:#e6edf3;--dim:#8b949e;--accent:#58a6ff;--green:#3fb950;--orange:#d2991d;--radius:8px}*{margin:0;padding:0;box-sizing:border-box}body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column}header{background:var(--surface);border-bottom:1px solid var(--border);padding:14px 20px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:10}header h1{font-size:1.1rem;display:flex;align-items:center;gap:8px}header nav{display:flex;gap:10px;align-items:center}header nav a{color:var(--dim);text-decoration:none;font-size:0.8rem}header nav a:hover{color:var(--text)}main{flex:1;max-width:800px;width:100%;margin:0 auto;padding:24px 16px}.tool-box{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:20px;margin-bottom:16px}.tool-box h2{font-size:1rem;margin-bottom:14px;color:var(--accent);display:flex;align-items:center;gap:6px}textarea,input[type="text"],input[type="url"]{width:100%;padding:10px;background:var(--bg);border:1px solid var(--border);border-radius:var(--radius);color:var(--text);font-family:'SF Mono',Consolas,monospace;font-size:0.85rem;resize:vertical;outline:none}textarea:focus,input:focus{border-color:var(--accent)}.btn{display:inline-flex;align-items:center;gap:6px;padding:10px 18px;background:var(--accent);color:#fff;border:none;border-radius:var(--radius);cursor:pointer;font-size:0.85rem;font-weight:600}.btn:hover{opacity:0.85}.btn-sm{padding:6px 12px;font-size:0.78rem}.btn-green{background:var(--green)}.row{display:flex;gap:10px;flex-wrap:wrap;align-items:center;margin:10px 0}.result-box{background:var(--bg);border:1px solid var(--border);border-radius:var(--radius);padding:14px;margin-top:14px;font-family:'SF Mono',Consolas,monospace;font-size:0.8rem;white-space:pre-wrap;max-height:300px;overflow-y:auto}.color-swatch{display:inline-block;width:44px;height:44px;border-radius:6px;border:2px solid var(--border);cursor:pointer;transition:transform 0.15s}.color-swatch:hover{transform:scale(1.15)}.palette{display:flex;gap:8px;flex-wrap:wrap;margin:10px 0}.bmc{display:inline-flex;align-items:center;gap:6px;padding:7px 14px;background:#FFDD00;color:#000;border-radius:20px;text-decoration:none;font-size:0.8rem;font-weight:600}.ad-slot{background:var(--surface);border:1px dashed var(--border);border-radius:var(--radius);padding:16px;text-align:center;margin:16px 0;min-height:90px;display:flex;align-items:center;justify-content:center;color:var(--dim);font-size:0.8rem}.footer-bar{text-align:center;padding:20px;font-size:0.75rem;color:var(--dim);border-top:1px solid var(--border);margin-top:auto}</style></head><body>
<header><h1>🎨 ColorPick</h1><nav><a href="https://andreygorban1582-dev.github.io/keyhole/">KeyHole</a><button class="btn btn-sm" onclick="copyPalette()">📋 Copy Palette</button></nav></header>
<main>
  <div class="ad-slot">📢 Advertisement — <a href="https://a-ads.com?partner=2305445" style="color:var(--accent)">Advertise here</a></div>
  <div class="tool-box">
    <h2>📸 Extract Color Palette from Image</h2>
    <div class="row"><input type="url" id="imgUrl" placeholder="Paste image URL..."><button class="btn" onclick="loadUrl()">Extract</button></div>
    <input type="file" id="imgFile" accept="image/*" onchange="loadFile()" style="margin-top:8px;color:var(--dim);font-size:0.85rem">
    <canvas id="canvas" style="display:none"></canvas>
    <div class="palette" id="palette"></div>
    <div class="result-box" id="colors" style="display:none"></div>
  </div>
  <div style="text-align:center"><a href="https://www.buymeacoffee.com/keyhole" class="bmc" target="_blank">☕ Buy me a coffee</a></div>
</main>
<div class="footer-bar">© 2026 ColorPick — Free online color palette extractor</div>
<script>
function loadFile(){const f=document.getElementById('imgFile').files[0];if(!f)return;const r=new FileReader();r.onload=function(e){extract(e.target.result)};r.readAsDataURL(f)}
function loadUrl(){const u=document.getElementById('imgUrl').value;if(!u)return;const img=new Image();img.crossOrigin='anonymous';img.onload=function(){const c=document.getElementById('canvas');c.width=img.width;c.height=img.height;c.getContext('2d').drawImage(img,0,0);extract(c.toDataURL())};img.src=u}
function extract(src){const img=new Image();img.onload=function(){const cv=document.getElementById('canvas'),ctx=cv.getContext('2d');cv.width=Math.min(img.width,300);cv.height=Math.min(img.height,300);ctx.drawImage(img,0,0,cv.width,cv.height);const d=ctx.getImageData(0,0,cv.width,cv.height).data,clrs={};for(let i=0;i<d.length;i+=24){const k=`${Math.round(d[i]/32)*32},${Math.round(d[i+1]/32)*32},${Math.round(d[i+2]/32)*32}`;clrs[k]=(clrs[k]||0)+1}const s=Object.entries(clrs).sort((a,b)=>b[1]-a[1]).slice(0,8);document.getElementById('palette').innerHTML=s.map(([k])=>{const[r,g,b]=k.split(',');const h='#'+[r,g,b].map(x=>(+x).toString(16).padStart(2,'0')).join('');return'<div class="color-swatch" style="background:'+h+'" title="'+h+'" onclick="copy(\''+h+'\')"></div>'}).join('');document.getElementById('colors').style.display='block';document.getElementById('colors').textContent=s.map(([k,c])=>{const[r,g,b]=k.split(',');return'#'+[r,g,b].map(x=>(+x).toString(16).padStart(2,'0')).join('')+' — '+c+' px'}).join('\\n')};img.src=src}
function copy(h){navigator.clipboard.writeText(h)}
function copyPalette(){const t=document.getElementById('colors').textContent;if(t)navigator.clipboard.writeText(t)}
</script></body></html>
