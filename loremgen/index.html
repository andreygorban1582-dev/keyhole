<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>LoremGen — Lorem Ipsum Generator</title>
<meta name="description" content="Free online Lorem Ipsum text generator. Generate placeholder paragraphs, sentences, or words.">
<style>
:root{
  --bg:#0d1117;
  --surface:#161b22;
  --border:#30363d;
  --text:#e6edf3;
  --dim:#8b949e;
  --accent:#58a6ff;
  --green:#3fb950;
  --orange:#d2991d;
  --radius:8px
}
*{margin:0;padding:0;box-sizing:border-box}
body{
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
  background:var(--bg);
  color:var(--text);
  min-height:100vh;
  display:flex;flex-direction:column
}
header{
  background:var(--surface);
  border-bottom:1px solid var(--border);
  padding:14px 20px;
  display:flex;align-items:center;justify-content:space-between;
  position:sticky;top:0;z-index:10
}
header h1{font-size:1.1rem;display:flex;align-items:center;gap:8px}
header nav{display:flex;gap:10px;align-items:center}
header nav a{color:var(--dim);text-decoration:none;font-size:0.8rem}
header nav a:hover{color:var(--text)}
main{
  flex:1;
  max-width:800px;width:100%;
  margin:0 auto;padding:24px 16px
}
.ad-slot{
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:var(--radius);
  padding:14px 16px;
  margin-bottom:16px;
  text-align:center;
  color:var(--dim);
  font-size:0.82rem
}
.ad-slot a{color:var(--accent);text-decoration:none}
.ad-slot a:hover{text-decoration:underline}
.tool-box{
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:var(--radius);
  padding:20px;
  margin-bottom:16px
}
.tool-box h2{
  font-size:1rem;
  margin-bottom:14px;
  color:var(--accent);
  display:flex;align-items:center;gap:6px
}
.controls{
  display:flex;gap:12px;
  flex-wrap:wrap;align-items:flex-end;
  margin-bottom:16px
}
.control-group{
  display:flex;flex-direction:column;gap:6px
}
.control-group label{
  font-size:0.78rem;
  color:var(--dim);
  font-weight:600;
  text-transform:uppercase;
  letter-spacing:0.5px
}
select,input[type="number"]{
  padding:10px 12px;
  background:var(--bg);
  border:1px solid var(--border);
  border-radius:var(--radius);
  color:var(--text);
  font-family:'SF Mono',Consolas,monospace;
  font-size:0.85rem;
  outline:none;
  min-width:140px;
  cursor:pointer
}
select:focus,input[type="number"]:focus{
  border-color:var(--accent)
}
.btn{
  display:inline-flex;align-items:center;gap:6px;
  padding:10px 18px;
  background:var(--accent);
  color:#fff;
  border:none;border-radius:var(--radius);
  cursor:pointer;
  font-size:0.85rem;font-weight:600;
  white-space:nowrap
}
.btn:hover{opacity:0.85}
.btn-sm{padding:6px 12px;font-size:0.78rem}
.btn-green{background:var(--green)}
.output-area{
  position:relative
}
textarea.output{
  width:100%;
  padding:14px;
  background:var(--bg);
  border:1px solid var(--border);
  border-radius:var(--radius);
  color:var(--text);
  font-family:'SF Mono',Consolas,monospace;
  font-size:0.85rem;
  resize:vertical;
  outline:none;
  min-height:200px;
  line-height:1.6
}
textarea.output:focus{border-color:var(--accent)}
.output-actions{
  display:flex;gap:8px;
  justify-content:flex-end;
  margin-top:10px
}
.bmc-row{
  text-align:center;
  margin-top:12px
}
.bmc{
  display:inline-flex;align-items:center;gap:6px;
  padding:10px 18px;
  background:var(--orange);
  color:#fff;
  text-decoration:none;
  border-radius:var(--radius);
  font-size:0.85rem;font-weight:600
}
.bmc:hover{opacity:0.85}
.footer-bar{
  text-align:center;
  padding:14px 20px;
  color:var(--dim);
  font-size:0.75rem;
  border-top:1px solid var(--border);
  background:var(--surface)
}
.info-row{
  display:flex;gap:8px;flex-wrap:wrap;
  margin-top:10px;
  font-size:0.75rem;color:var(--dim)
}
.info-row span{
  background:var(--bg);
  border:1px solid var(--border);
  border-radius:4px;
  padding:3px 8px
}
</style>
</head>
<body>

<header>
  <h1>📝 LoremGen</h1>
  <nav>
    <a href="https://andreygorban1582-dev.github.io/keyhole/">KeyHole</a>
    <button class="btn btn-sm" onclick="copyOutput()">📋 Copy</button>
  </nav>
</header>

<main>
  <div class="ad-slot">
    📢 Advertisement — <a href="https://a-ads.com?partner=2305445">Advertise here</a>
  </div>

  <div class="tool-box">
    <h2>⚡ Generate Lorem Ipsum</h2>

    <div class="controls">
      <div class="control-group">
        <label for="mode">Mode</label>
        <select id="mode">
          <option value="paragraphs">Paragraphs</option>
          <option value="sentences">Sentences</option>
          <option value="words">Words</option>
        </select>
      </div>
      <div class="control-group">
        <label for="count">Count</label>
        <input type="number" id="count" value="3" min="1" max="20">
      </div>
      <div class="control-group" style="justify-content:flex-end">
        <button class="btn" onclick="generate()">⚡ Generate</button>
      </div>
    </div>

    <div class="output-area">
      <textarea class="output" id="output" readonly placeholder="Your lorem ipsum will appear here..."></textarea>
      <div class="output-actions">
        <button class="btn btn-sm btn-green" onclick="copyOutput()">📋 Copy to Clipboard</button>
      </div>
    </div>

    <div class="info-row" id="stats"></div>
  </div>

  <div class="bmc-row">
    <a href="https://www.buymeacoffee.com/keyhole" class="bmc" target="_blank">☕ Buy me a coffee</a>
  </div>
</main>

<div class="footer-bar">© 2026 LoremGen — Free online Lorem Ipsum text generator</div>

<script>
// ── Lorem Ipsum word pool ──
const WORDS = [
  "lorem","ipsum","dolor","sit","amet","consectetur","adipiscing","elit",
  "sed","do","eiusmod","tempor","incididunt","ut","labore","et","dolore",
  "magna","aliqua","enim","ad","minim","veniam","quis","nostrud",
  "exercitation","ullamco","laboris","nisi","ut","aliquip","ex","ea",
  "commodo","consequat","duis","aute","irure","dolor","in",
  "reprehenderit","in","voluptate","velit","esse","cillum","dolore","eu",
  "fugiat","nulla","pariatur","excepteur","sint","occaecat","cupidatat",
  "non","proident","sunt","in","culpa","qui","officia","deserunt",
  "mollit","anim","id","est","laborum","praesent","sapien","massa",
  "convallis","a","pellentesque","nec","egestas","non","nisi","aliquam",
  "nulla","sit","amet","est","placerat","in","egestas","erat",
  "imperdiet","sed","euismod","nisi","porta","lorem","mollis","aliquet",
  "ut","porttitor","leo","a","diam","sollicitudin","tempor","id","eu",
  "nisl","nunc","mi","ipsum","faucibus","vitae","aliquet","nec",
  "ullamcorper","sit","amet","risus","nullam","eget","felis","eget",
  "nunc","lobortis","mattis","aliquam","faucibus","purus","in","massa",
  "tempor","nec","feugiat","nisl","pretium","fusce","id","velit","ut",
  "tortor","pretium","viverra","suspendisse","potenti","nullam","ac",
  "tortor","vitae","purus","faucibus","ornare","suspendisse","sed","nisi",
  "lacus","sed","viverra","tellus","in","hac","habitasse","platea",
  "dictumst","vestibulum","rhoncus","est","pellentesque","elit",
  "ullamcorper","dignissim","cras","tincidunt","lobortis","feugiat",
  "vivamus","at","augue","eget","arcu","dictum","varius","duis","at",
  "consectetur","lorem","donec","massa","sapien","faucibus","et",
  "molestie","ac","feugiat","sed","lectus","vestibulum","mattis",
  "ullamcorper","velit","sed","ullamcorper","morbi","tincidunt","ornare",
  "massa","eget","egestas","purus","viverra","accumsan","in","nisl",
  "nisi","scelerisque","eu","ultrices","vitae","auctor","eu","augue",
  "ut","lectus","arcu","bibendum","at","varius","vel","pharetra","vel",
  "turpis","nunc","eget","lorem","dolor","sed","viverra","ipsum","nunc",
  "aliquet","bibendum","enim","facilisis","gravida","neque","convallis",
  "a","cras","semper","auctor","neque","vitae","tempus","quam",
  "pellentesque","nec","nam","aliquam","sem","et","tortor","consequat"
];

// ── Helpers ──
function rand(min,max){ return Math.floor(Math.random()*(max-min+1))+min }
function pick(arr){ return arr[Math.floor(Math.random()*arr.length)] }
function capitalize(s){ return s.charAt(0).toUpperCase()+s.slice(1) }

// ── Sentence generation ──
function generateSentence(){
  const len = rand(5,15);
  const words = [];
  for(let i=0;i<len;i++) words.push(pick(WORDS));
  return capitalize(words.join(' '))+'.'
}

// ── Paragraph generation ──
function generateParagraph(){
  const sentences = rand(3,7);
  const parts = [];
  for(let i=0;i<sentences;i++) parts.push(generateSentence());
  return parts.join(' ')
}

// ── Generate ──
function generate(){
  const mode = document.getElementById('mode').value;
  const count = parseInt(document.getElementById('count').value) || 3;
  const clamped = Math.max(1,Math.min(20,count));
  document.getElementById('count').value = clamped;

  let result = '';
  let wordCount = 0;
  let sentenceCount = 0;

  if(mode==='paragraphs'){
    const paras = [];
    for(let i=0;i<clamped;i++){
      const p = generateParagraph();
      paras.push(p);
      sentenceCount += (p.match(/\. /g)||[]).length + (p.endsWith('.')?1:0);
    }
    result = paras.join('\n\n');
    wordCount = result.split(/\s+/).filter(w=>w.length>0).length;
  }else if(mode==='sentences'){
    const sentences = [];
    for(let i=0;i<clamped;i++) sentences.push(generateSentence());
    result = sentences.join(' ');
    sentenceCount = clamped;
    wordCount = result.split(/\s+/).filter(w=>w.length>0).length;
  }else{
    const words = [];
    for(let i=0;i<clamped;i++) words.push(pick(WORDS));
    result = words.join(' ');
    wordCount = clamped;
  }

  document.getElementById('output').value = result;
  document.getElementById('stats').innerHTML =
    '<span>📝 Words: '+wordCount+'</span>'+
    (mode!=='words'?'<span>📄 Sentences: '+(sentenceCount||clamped)+'</span>':'')+
    '<span>📐 Characters: '+result.length+'</span>';
}

// ── Copy ──
function copyOutput(){
  const t = document.getElementById('output');
  if(!t.value) return;
  navigator.clipboard.writeText(t.value).then(()=>{
    const btn = event.target.closest('button');
    if(btn){
      const orig = btn.textContent;
      btn.textContent = '✅ Copied!';
      btn.style.background = 'var(--green)';
      setTimeout(()=>{btn.textContent=orig;btn.style.background=''},1500);
    }
  });
}

// ── Generate on load ──
generate();
</script>

</body>
</html>
